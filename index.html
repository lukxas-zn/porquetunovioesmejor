<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Princesita ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-sweet: #ffb3c1;
            --pixel-text: #c9184a;
            --btn-bg: #ff758f;
            --bg-dark: #000000;
            --accent-dark: #991b1b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-dark); /* El fondo base SIEMPRE es negro ahora */
            overflow-x: hidden;
            font-family: 'Quicksand', sans-serif;
        }

        /* --- CORTINA ROSA (Se rasga/desliza) --- */
        #cortina-rosa {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--bg-sweet);
            z-index: 100; /* Por encima de todo */
            transition: transform 1.5s cubic-bezier(0.65, 0.05, 0.36, 1); /* Movimiento suave */
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto; /* Permitir scroll dentro de la cortina */
        }

        /* Efecto de Rasgadura en el borde inferior */
        #cortina-rosa::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px; /* Altura de la rasgadura */
            background-image: url('rasgadura.png'); /* TU IMAGEN AQUÍ */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: bottom;
            transform: translateY(100%); /* Empieza justo debajo */
            
            /* PLAN B: Si no subes la imagen, esto crea un borde dentado burdo */
            /* background-image: linear-gradient(135deg, var(--bg-sweet) 25%, transparent 25%), linear-gradient(225deg, var(--bg-sweet) 25%, transparent 25%); background-position: 0 0, 0 0; background-size: 20px 20px; */
        }

        /* Clase para activar la transición (se desliza arriba) */
        #cortina-rosa.rasgada {
            transform: translateY(-100%);
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }

        /* --- ESTILO PIXEL --- */
        .pixel-font {
            font-family: 'Press Start 2P', cursive;
            text-transform: uppercase;
            line-height: 1.6;
        }

        .btn {
            padding: 15px 25px;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin: 10px;
            background-color: var(--btn-bg);
            color: white;
            font-family: 'Quicksand', sans-serif;
        }

        /* --- CONTENIDO TIERNO (Dentro de la cortina) --- */
        .hero { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .razon-item {
            background: rgba(255, 255, 255, 0.8);
            margin: 10px 0;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid var(--btn-bg);
            font-weight: 600;
            color: #590d22;
        }

        /* --- MODO OSCURO (Ya está debajo, se revela) --- */
        #seccion-oscura {
            position: relative;
            z-index: 10; /* Debajo de la cortina */
            display: none; /* Se activa con JS */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-dark);
        }
        
        .titulo-dark {
            color: var(--accent-dark);
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .typewriter {
            color: #ffffff;
            font-size: 0.7rem;
            line-height: 2.2;
            text-align: left;
            word-spacing: 2px;
        }

        .destacado { color: var(--accent-dark); font-weight: bold; }

        /* --- CORAZONES --- */
        .heart {
            position: fixed;
            top: -10vh;
            color: var(--accent-dark);
            font-size: 15px;
            z-index: 5; /* Detrás de la cortina cuando baja, pero delante del texto dark */
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* --- ALERTA --- */
        #alert-box {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 200; /* Por encima de la cortina */
        }
        #alert-content {
            background: var(--bg-sweet); padding: 25px; border-radius: 15px;
            border: 4px solid var(--pixel-text); font-family: 'Press Start 2P'; font-size: 0.6rem; text-align: center;
            color: var(--pixel-text);
        }
    </style>
</head>
<body>

    <div id="cortina-rosa">
        <div id="portada" class="hero container">
            <p class="pixel-font" style="color: var(--pixel-text);">Porque tu novio <br>es mejor q todos ❤️</p>
            <p class="pixel-font" style="font-size: 0.5rem; color: #590d22;">¿quieres verlo?</p>
            <div>
                <button class="btn" onclick="mostrarAlerta('ver')">Ver</button>
                <button class="btn" onclick="mostrarAlerta('nover')">No Ver</button>
            </div>
        </div>

        <div id="lista-razones" class="container" style="display: none;">
            <h2 class="pixel-font" style="color: var(--pixel-text); font-size: 0.9rem;">Porque es el mejor</h2>
            <div class="razon-item">Pq te va tener consentida</div>
            <div class="razon-item">Pq es hermoso</div>
            <div class="razon-item">Pq te va tratar como ningún otro te trato</div>
            <div class="razon-item">Pq te ama más que todos</div>
            <div class="razon-item">Pq es tu cachorrito</div>
            
            <div style="margin-top:40px; border-top: 2px dashed #ff758f; padding-top:20px; text-align: center; width: 100%;">
                <p style="font-family: 'Quicksand'; font-size:0.8rem; color: #590d22;">Mentira en realidad es por esto...</p>
                <button class="btn" style="background:#590d22;" onclick="activarEfectoRasgado()">Ver la realidad</button>
            </div>
        </div>
    </div>

    <div id="seccion-oscura" class="container">
        <h1 class="pixel-font titulo-dark">¿Porqué tu novio es mejor?</h1>
        <div id="typewriter-text" class="pixel-font typewriter"></div>
    </div>

    <div id="alert-box">
        <div id="alert-content">
            <p id="alert-text"></p>
            <button class="btn" onclick="cerrarAlerta()">Continuar</button>
        </div>
    </div>

    <audio id="musica-oscura" src="TU_MUSICA.mp3" preload="auto"></audio>

    <script>
        const textoDark = "Pq tu novio va amarte hasta borrar cada gesto de cariño que no fue de el y adorarte como si fuera lo único que existe en este mundo, te haré sentir de la mejor manera posible mi princesita, ponerte en una cajita de cristal para q solo yo pueda apreciarte. Bañarte, cambiarte, peinarte, mirarte, humillarte, <span class='destacado'>solo yo tocarte y verte</span>, pq me encantas demasiadote te voy a amar tanto que no vas a poder olvidarme nunca por que cada alguien te diga o te dedique algo yo ya lo abre hecho antes. Tendré que amarte de todas las maneras posibles al punto q mismo si intentarás algo con alguien más veas que no te amara de esa misma manera enfermiza o loca e intensa en la que yo lo hacía. Aunque lamentablemente <span class='destacado'>si no es conmigo no es con nadie</span> y estarás conmigo para siempre, pase lo que pasé mi amorcito.";

        function mostrarAlerta(tipo) {
            document.getElementById('alert-text').innerText = (tipo === 'ver') ? "para que necesitas ver si sabes que es el mejor hasta el lo sabe pero te dejaré verlo" : "vas a ver igual";
            document.getElementById('alert-box').style.display = 'flex';
        }

        function cerrarAlerta() {
            document.getElementById('alert-box').style.display = 'none';
            document.getElementById('portada').style.display = 'none';
            document.getElementById('lista-razones').style.display = 'block';
        }

        function activarEfectoRasgado() {
            const cortina = document.getElementById('cortina-rosa');
            const seccionOscura = document.getElementById('seccion-oscura');
            const musica = document.getElementById('musica-oscura');

            // 1. Preparamos la sección oscura debajo
            seccionOscura.style.display = 'flex';

            // 2. Activamos la animación de rasgado/deslizamiento
            cortina.classList.add('rasgada');

            // 3. Iniciamos música y corazones
            musica.play().catch(() => {});
            setInterval(createHeart, 400);

            // 4. Iniciamos el efecto de escritura DESPUÉS de que la cortina se mueva un poco
            setTimeout(iniciarEscritura, 1000); 
        }

        function iniciarEscritura() {
            let i = 0;
            const element = document.getElementById('typewriter-text');
            function type() {
                if (i < textoDark.length) {
                    if (textoDark.slice(i, i + 1) === '<') {
                        let endTag = textoDark.indexOf('>', i);
                        element.innerHTML += textoDark.slice(i, endTag + 1);
                        i = endTag + 1;
                    } else {
                        element.innerHTML += textoDark.charAt(i);
                        i++;
                    }
                    setTimeout(type, 35);
                }
            }
            type();
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 95 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
    </script>
</body>
</html>
