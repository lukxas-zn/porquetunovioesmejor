<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Princesita ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-sweet: #ffcad4; /* Rosa más suave y cute */
            --pixel-text: #c9184a;
            --btn-bg: #ff758f;
            --bg-dark: #000000;
            --accent-dark: #991b1b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-dark);
            overflow-x: hidden;
            font-family: 'Quicksand', sans-serif;
        }

        /* --- FONDO CUTE CON PARTICULAS --- */
        #cortina-rosa {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(180deg, #ffcad4 0%, #fbc4ab 100%);
            z-index: 100;
            transition: transform 1.8s cubic-bezier(0.65, 0.05, 0.36, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* Bolitas difuminadas (estilo imagen 1) */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(8px);
            z-index: -1;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(110vh); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* Borde de rasgadura */
        #cortina-rosa::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 80px;
            background-image: url('rasgadura.png');
            background-size: contain;
            background-repeat: repeat-x;
            z-index: 110;
        }

        #cortina-rosa.rasgada { transform: translateY(-105%); }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }

        .pixel-font {
            font-family: 'Press Start 2P', cursive;
            text-transform: uppercase;
            line-height: 1.6;
        }

        .btn {
            padding: 15px 25px;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin: 10px;
            background-color: var(--btn-bg);
            color: white;
            box-shadow: 0 4px 15px rgba(201, 24, 74, 0.2);
        }

        /* --- MODO OSCURO REVELADO --- */
        #seccion-oscura {
            position: relative;
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .titulo-dark { color: var(--accent-dark); font-size: 1.2rem; margin-bottom: 30px; }

        .typewriter {
            color: #ffffff;
            font-size: 0.75rem;
            line-height: 2.3;
            text-align: left;
        }

        .destacado { color: var(--accent-dark); font-weight: bold; }

        /* --- CORAZONES Y ALERTAS --- */
        .heart { position: fixed; top: -10vh; color: var(--accent-dark); font-size: 15px; z-index: 5; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh); } }

        #alert-box {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 200;
        }
        #alert-content {
            background: #fff0f3; padding: 25px; border-radius: 15px;
            border: 4px solid var(--pixel-text); font-family: 'Press Start 2P'; font-size: 0.6rem; text-align: center; color: var(--pixel-text);
        }
    </style>
</head>
<body>

    <div id="cortina-rosa">
        <div class="bubble" style="width:80px; height:80px; left:10%; animation-delay: 2s;"></div>
        <div class="bubble" style="width:120px; height:120px; left:60%; animation-delay: 0s;"></div>
        <div class="bubble" style="width:50px; height:50px; left:80%; animation-delay: 5s;"></div>

        <div id="portada" class="container" style="height:80vh; display:flex; flex-direction:column; justify-content:center;">
            <p class="pixel-font" style="color: var(--pixel-text);">Porque tu novio <br>es mejor q todos ❤️</p>
            <p class="pixel-font" style="font-size: 0.5rem; color: #590d22;">¿quieres verlo?</p>
            <div>
                <button class="btn" onclick="mostrarAlerta('ver')">Ver</button>
                <button class="btn" onclick="mostrarAlerta('nover')">No Ver</button>
            </div>
        </div>

        <div id="lista-razones" class="container" style="display: none;">
            <h2 class="pixel-font" style="color: var(--pixel-text); font-size: 0.9rem;">Porque es el mejor</h2>
            <div style="background:rgba(255,255,255,0.5); padding:10px; border-radius:15px;">
                <p>Pq te va tener consentida</p>
                <p>Pq es hermoso</p>
                <p>Pq te va tratar como ningún otro te trato</p>
                <p>Pq te ama más que todos</p>
                <p>Pq es tu cachorrito</p>
            </div>
            <div style="margin-top:40px;">
                <p style="font-size:0.8rem; color: #590d22;">Mentira en realidad es por esto...</p>
                <button class="btn" style="background:#590d22;" onclick="activarEfectoRasgado()">Ver la realidad</button>
            </div>
        </div>
    </div>

    <div id="seccion-oscura" class="container">
        <h1 class="pixel-font titulo-dark">¿Porqué tu novio es mejor?</h1>
        <div id="typewriter-text" class="pixel-font typewriter"></div>
    </div>

    <div id="alert-box">
        <div id="alert-content">
            <p id="alert-text"></p>
            <button class="btn" onclick="cerrarAlerta()">Continuar</button>
        </div>
    </div>

    <audio id="musica-oscura" src="TU_MUSICAA.mp3" preload="auto"></audio>

    <script>
        const textoDark = "Pq tu novio va amarte hasta borrar cada gesto de cariño que no fue de el y adorarte como si fuera lo único que existe en este mundo, te haré sentir de la mejor manera posible mi princesita, ponerte en una cajita de cristal para q solo yo pueda apreciarte. Bañarte, cambiarte, peinarte, mirarte, humillarte, <span class='destacado'>solo yo tocarte y verte</span>, pq me encantas demasiadote te voy a amar tanto que no vas a poder olvidarme nunca por que cada alguien te diga o te dedique algo yo ya lo abre hecho antes. Tendré que amarte de todas las maneras posibles al punto q mismo si intentarás algo con alguien más veas que no te amara de esa misma manera enfermiza o loca e intensa en la que yo lo hacía. Aunque lamentablemente <span class='destacado'>si no es conmigo no es con nadie</span> y estarás conmigo para siempre, pase lo que pasé mi amorcito.";

        function mostrarAlerta(tipo) {
            document.getElementById('alert-text').innerText = (tipo === 'ver') ? "para que necesitas ver si sabes que es el mejor hasta el lo sabe pero te dejaré verlo" : "vas a ver igual";
            document.getElementById('alert-box').style.display = 'flex';
        }

        function cerrarAlerta() {
            document.getElementById('alert-box').style.display = 'none';
            document.getElementById('portada').style.display = 'none';
            document.getElementById('lista-razones').style.display = 'block';
        }

        function activarEfectoRasgado() {
            document.getElementById('seccion-oscura').style.display = 'flex';
            document.getElementById('cortina-rosa').classList.add('rasgada');
            
            // MUSICA CON RETRASO DE 2 SEGUNDOS
            setTimeout(() => {
                document.getElementById('musica-oscura').play().catch(() => {});
            }, 2000);

            setInterval(createHeart, 400);
            setTimeout(iniciarEscritura, 1200); 
        }

        function iniciarEscritura() {
            let i = 0;
            const element = document.getElementById('typewriter-text');
            function type() {
                if (i < textoDark.length) {
                    if (textoDark.slice(i, i + 1) === '<') {
                        let endTag = textoDark.indexOf('>', i);
                        element.innerHTML += textoDark.slice(i, endTag + 1);
                        i = endTag + 1;
                    } else {
                        element.innerHTML += textoDark.charAt(i);
                        i++;
                    }
                    setTimeout(type, 40);
                }
            }
            type();
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 95 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
    </script>
</body>
          </html>
